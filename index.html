<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#031326">
  <title>VD Logo Animation</title>
  <style>
    :root {
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: transparent;
    }

    .scene {
      position: relative;
      width: min(72vw, 430px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .logo {
      width: 82%;
      overflow: visible;
      filter: drop-shadow(0 22px 28px rgba(0, 0, 0, .42));
      animation: float 4s ease-in-out 2s infinite;
    }

    .ring-outer,
    .ring-inner,
    .bolt-shadow,
    .bolt-main {
      transform-box: fill-box;
      transform-origin: center;
    }

    .ring-outer {
      opacity: 0;
      animation: ring-in .48s cubic-bezier(.16, 1, .3, 1) .48s forwards;
    }

    .ring-inner {
      opacity: 0;
      animation: ring-in .42s cubic-bezier(.16, 1, .3, 1) .08s forwards;
    }

    .bolt-shadow {
      opacity: 0;
      animation: bolt-strike .22s cubic-bezier(.05, .75, .18, 1) 1.08s forwards;
    }

    .bolt-main {
      opacity: 0;
      animation: bolt-strike .2s cubic-bezier(.05, .75, .18, 1) 1.19s forwards,
                 flash 3.2s ease-in-out 1.7s infinite;
    }

    .speed-line {
      fill: none;
      stroke: #aefe22;
      stroke-width: 1.15;
      stroke-linecap: round;
      stroke-dasharray: 18;
      stroke-dashoffset: 18;
      opacity: 0;
      animation: speed-trail .3s ease-out 1.01s forwards;
    }

    .speed-line.second {
      animation-delay: 1.1s;
    }

    @keyframes ring-in {
      0% { opacity: 0; transform: scale(.3) rotate(-35deg); }
      72% { opacity: 1; transform: scale(1.08) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes bolt-strike {
      0% { opacity: 0; transform: translate(72px, -88px) scale(.72); }
      72% { opacity: 1; transform: translate(-2px, 3px) scale(1.03); }
      100% { opacity: 1; transform: translate(0) scale(1); }
    }

    @keyframes speed-trail {
      0% { opacity: 0; stroke-dashoffset: 18; }
      30% { opacity: .9; }
      100% { opacity: 0; stroke-dashoffset: -18; }
    }

    @keyframes flash {
      0%, 76%, 100% { filter: drop-shadow(0 0 0 transparent); }
      85% { filter: drop-shadow(0 0 9px rgba(190, 255, 32, .95)); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Animasi logo VD">
    <svg class="logo" viewBox="0 0 93.300247 107.21929" role="img" aria-labelledby="logo-title">
      <title id="logo-title">Logo VD</title>
      <defs>
        <linearGradient id="blue" x1="82" y1="75" x2="113" y2="146" gradientUnits="userSpaceOnUse">
          <stop stop-color="#0b85ad"/><stop offset=".45" stop-color="#04759f"/><stop offset="1" stop-color="#061c42"/>
        </linearGradient>
        <linearGradient id="green" x1="120" y1="70" x2="76" y2="140" gradientUnits="userSpaceOnUse">
          <stop stop-color="#008c08"/><stop offset="1" stop-color="#0b8f00"/>
        </linearGradient>
        <linearGradient id="lime" x1="126" y1="52" x2="78" y2="140" gradientUnits="userSpaceOnUse">
          <stop stop-color="#c9ff19"/><stop offset=".48" stop-color="#adff1d"/><stop offset="1" stop-color="#59cf2e"/>
        </linearGradient>
      </defs>
      <g transform="translate(-49.06732 -47.742905)">
        <path class="ring-outer" fill="url(#blue)" d="M95.7177 61.661952a46.65 46.65 0 1 0 0 93.300248 46.65 46.65 0 0 0 0-93.300248Zm0 10.20041a37.05 36.45 0 1 1 0 72.899938 37.05 36.45 0 0 1 0-72.899938Z"/>
        <path class="ring-inner" fill="url(#blue)" d="M84.317601 93.352764a27.55924 27.55924 0 1 0 0 55.118626 27.55924 27.55924 0 0 0 0-55.118626Zm0 6.026046a21.887887 21.533426 0 1 1 0 43.06683 21.887887 21.533426 0 0 1 0-43.06683Z"/>
        <path class="speed-line" d="m151 39-21 24"/>
        <path class="speed-line second" d="m157 53-18 20"/>
        <path class="bolt-shadow" fill="url(#green)" d="m102.0894 70.232492 39.6875-.52917-66.93958 70.643748Z"/>
        <path class="bolt-main" fill="url(#lime)" d="m98.64982 56.209572 34.39583-8.466667-58.20833 92.604165Z"/>
      </g>
    </svg>
  </main>
</body>
</html>
